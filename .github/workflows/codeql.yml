name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    uses: tskovlund/.github/.github/workflows/codeql.yml@main
    with:
      language: javascript-typescript
    permissions:
      security-events: write
